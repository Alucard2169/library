        <div class="bookDisplay"></div>
    </section>


    <div class="addForum">
        <form id="form">
            <label for="titleValue">Title</label>
            <input type="text" name="book-title" id="titleValue" required>
            <label for="authorValue">Author </label>
            <input type="text" name="book-author" id="authorValue" required>
            <label for="statusValue">Status</label>
            <input type="text" name="book-status" id="statusValue" required>
            <label for="pageValue">Page</label>
            <input type="number" name="book-page" id="pageValue" required>
            <label for="imageValue">Image</label>
            <input type="text" name="book-image" id="imageValue" placeholder="(optional)">
            <input type="submit" value="submit" id="button">
        </form>
